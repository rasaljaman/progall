name: 🔕 Auto-Pipeline (Disabled)

# This workflow has been replaced by the Apify + n8n + Gemini pipeline.
# n8n (hosted on Render) now handles scraping, Gemini prompt enhancement,
# and inserting into the Supabase pending_posts table.
#
# To trigger new content ingestion, use the n8n workflow dashboard.

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'This workflow is disabled. Use n8n instead.'
        required: false
        default: 'See n8n dashboard on Render'

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: ℹ️ Pipeline Disabled
        run: |
          echo "This GitHub Actions pipeline is no longer active."
          echo "Content ingestion is handled by Apify + n8n + Gemini."
          echo "Check your n8n dashboard on Render to manage workflows."
