name: 🤖 Auto-Pipeline — Reddit → AI → Gallery

on:
  schedule:
    # Run every 6 hours (at 02:00, 08:00, 14:00, 20:00 UTC)
    # Offset from the X fetcher to spread API usage
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes to Supabase)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      max_posts:
        description: 'Maximum posts to process (1-20)'
        required: false
        default: '8'
      min_score:
        description: 'Minimum Reddit score (upvotes)'
        required: false
        default: '30'

jobs:
  auto-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🤖 Run Auto-Pipeline
        env:
          # Reddit OAuth (optional — falls back to public API if absent)
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:      ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:      ${{ secrets.REDDIT_PASSWORD }}

          # AI Services
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN:       ${{ secrets.HF_TOKEN }}

          # Supabase
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

          # Runtime config
          DRY_RUN:   ${{ github.event.inputs.dry_run  || 'false' }}
          MAX_POSTS: ${{ github.event.inputs.max_posts || '8' }}
          MIN_SCORE: ${{ github.event.inputs.min_score || '30' }}

        run: node scripts/auto-pipeline.mjs

      - name: 📊 Print workflow summary
        if: always()
        run: |
          echo "### 🤖 ProGall Auto-Pipeline Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ github.event.inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Max Posts | ${{ github.event.inputs.max_posts || '8' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run At | $(date -u) |" >> $GITHUB_STEP_SUMMARY
